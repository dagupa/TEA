<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunicador TEA</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="phrase-bar-container">
            <div class="phrase-bar" id="phrase-bar">
                <div class="phrase-content" id="phrase-content">
                    <span class="placeholder-text">Toca las imágenes para hablar...</span>
                </div>
            </div>
            <div class="action-buttons">
                <button class="btn btn-speak" id="btn-speak" aria-label="Hablar frase">
                    <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                </button>
                <button class="btn btn-clear" id="btn-clear" aria-label="Borrar frase">
                    <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
        </header>

        <main class="board-container">
            <div class="board-grid" id="board-grid">
                <!-- Pictograms will be injected here via JS -->
            </div>
        </main>
        
        <footer class="settings-bar">
            <div class="edit-toggle-container">
                <label for="edit-mode-toggle" class="edit-label">Modo Configuración (Grabar Voz):</label>
                <label class="switch">
                    <input type="checkbox" id="edit-mode-toggle">
                    <span class="slider round"></span>
                </label>
            </div>
            
            <label for="voice-select">Voz robótica:</label>
            <select id="voice-select" class="voice-select"></select>
        </footer>
    </div>

    <!-- Notification toast -->
    <div id="toast" class="toast"></div>

    <!-- Recorder Modal -->
    <div id="recorder-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="modal-title">Grabar voz para...</h2>
            <div class="recorder-controls">
                <button id="btn-record" class="btn btn-record" aria-label="Grabar">🎙️ Grabar</button>
                <button id="btn-stop" class="btn btn-stop" aria-label="Detener" disabled>🛑 Detener</button>
                <button id="btn-play-rec" class="btn btn-play-rec" aria-label="Escuchar" disabled>▶️ Escuchar</button>
            </div>
            <p id="recorder-status" class="recorder-status">Listo para grabar</p>
            <audio id="audio-preview" style="display: none;"></audio>
            
            <div class="modal-actions">
                <button id="btn-save-rec" class="btn btn-save" disabled>Guardar Grabación</button>
                <button id="btn-cancel-rec" class="btn btn-cancel">Cerrar</button>
                <button id="btn-delete-rec" class="btn btn-delete" style="display: none;">Borrar Grabación Actual</button>
                
                <hr style="margin: 1.5rem 0 1rem 0; border: none; border-top: 1px solid #e2e8f0;">
                <h3 style="font-size: 1.1rem; margin-bottom: 0.5rem; text-align: center;">Cambiar Foto / Dibujo</h3>
                <input type="file" id="override-picto-file" accept="image/*" style="margin-bottom: 0.5rem; width: 100%;">
                <button id="btn-save-override-img" class="btn btn-save" style="background-color: #f59e0b; display: none;">Guardar Nueva Foto</button>
                <button id="btn-delete-override-img" class="btn btn-delete" style="display: none;">Restaurar Dibujo Original</button>

                <hr style="margin: 1rem 0; border: none; border-top: 1px solid #e2e8f0;">
                <button id="btn-delete-picto" class="btn btn-delete" style="display: none; background-color: #991b1b; color: white;">🗑️ Borrar Foto Definitivamente</button>
            </div>
        </div>
    </div>

    <!-- Add Custom Picto Modal -->
    <div id="add-picto-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>Añadir foto personalizada</h2>
            <div class="form-group">
                <label for="custom-picto-name">Nombre / Palabra:</label>
                <input type="text" id="custom-picto-name" placeholder="Ej: Mamá, Toby..." maxlength="20">
            </div>
            <div class="form-group">
                <label for="custom-picto-file">Seleccionar foto:</label>
                <input type="file" id="custom-picto-file" accept="image/*">
            </div>
            <img id="custom-picto-preview" style="max-width: 150px; max-height: 150px; margin: 1rem auto; display: none; border-radius: 8px; object-fit: cover;">
            <div class="modal-actions">
                <button id="btn-save-custom-picto" class="btn btn-save" disabled>Guardar Foto</button>
                <button id="btn-cancel-custom-picto" class="btn btn-cancel">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
