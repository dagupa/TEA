<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunicador TEA</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="phrase-bar-container">
            <div class="phrase-bar" id="phrase-bar">
                <div class="phrase-content" id="phrase-content">
                    <span class="placeholder-text">Toca las imágenes para hablar...</span>
                </div>
            </div>
            <div class="action-buttons">
                <button class="btn btn-speak" id="btn-speak" aria-label="Hablar frase">
                    <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                </button>
                <button class="btn btn-clear" id="btn-clear" aria-label="Borrar frase">
                    <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
                <button class="btn btn-settings" id="btn-settings" title="Configuración" style="background-color: var(--card-bg); border: 2px solid var(--border-color); font-size: 1.5rem;">⚙️</button>
            </div>
        </header>

        <main class="board-container">
            <div class="board-grid" id="board-grid">
                <!-- Pictograms will be injected here via JS -->
            </div>
        </main>
        
        <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="margin-bottom: 1.5rem;">Configuración</h2>
            <div class="form-group">
                <label for="voice-select">Voz de lectura robótica:</label>
                <select id="voice-select" class="voice-select" style="width:100%; max-width: none;"></select>
            </div>
            <div class="form-group" style="display: flex; justify-content: space-between; align-items: center; background: var(--bg-color); padding: 1rem; border-radius: var(--border-radius-sm);">
                <label style="margin:0; display: flex; align-items: center; gap: 0.5rem;">🌙 Modo Oscuro</label>
                <label class="switch">
                    <input type="checkbox" id="theme-toggle">
                    <span class="slider round"></span>
                </label>
            </div>
            <div class="form-group" style="display: flex; justify-content: space-between; align-items: center; background: #fee2e2; padding: 1rem; border-radius: var(--border-radius-sm);">
                <label style="margin:0; display: flex; align-items: center; gap: 0.5rem; color: #b91c1c;">✏️ Editar Tablero</label>
                <label class="switch">
                    <input type="checkbox" id="edit-mode-toggle">
                    <span class="slider round" style="background-color: #fca5a5;"></span>
                </label>
            </div>
            <hr style="margin: 1.5rem 0; border: none; border-top: 1px solid var(--border-color);">
            <div class="modal-actions" style="flex-direction: row; gap: 1rem;">
                <button id="btn-change-pin" class="btn" style="flex: 1; background: var(--bg-color); color: var(--text-primary); border: 2px solid var(--border-color); height: 45px; border-radius: var(--border-radius-sm); font-weight: 700;">Cambiar PIN</button>
                <button id="btn-close-settings" class="btn btn-cancel" style="flex: 1; margin: 0;">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- PIN Modal -->
    <div id="pin-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 350px;">
            <h2 id="pin-title">Control Parental</h2>
            <p id="pin-desc" style="color: var(--text-secondary); margin-bottom: 1.5rem;">Introduce el PIN para acceder.</p>
            <div class="form-group">
                <input type="password" id="pin-input" placeholder="****" maxlength="4" style="text-align:center; font-size: 2.5rem; letter-spacing: 0.5rem; font-weight: bold;">
            </div>
            <p id="pin-error" style="color: #ef4444; display: none; margin-bottom: 1rem; font-weight: 600;">PIN incorrecto</p>
            <div class="modal-actions">
                <button id="btn-submit-pin" class="btn btn-save">Aceptar</button>
                <button id="btn-cancel-pin" class="btn btn-cancel">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Notification toast -->
    <div id="toast" class="toast"></div>

    <!-- Edit Item Modal -->
    <div id="recorder-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 700px; width: 95%;">
            <h2 id="modal-title" style="margin-bottom: 1.5rem;">Configurar Tarjeta</h2>
            
            <div class="editor-columns">
                <!-- COL 1: VOZ -->
                <div class="editor-col">
                    <div class="col-header" style="border-bottom: 3px solid #3b82f6;">🎙️ 1. Sonido / Voz</div>
                    <div class="recorder-controls" style="flex-wrap: wrap;">
                        <button id="btn-record" class="btn btn-record" style="width: auto; padding: 0.75rem;">Grabar</button>
                        <button id="btn-stop" class="btn btn-stop" style="width: auto; padding: 0.75rem;" disabled>Detener</button>
                        <button id="btn-play-rec" class="btn btn-play-rec" style="width: auto; padding: 0.75rem;" disabled>Escuchar</button>
                    </div>
                    <p id="recorder-status" class="recorder-status">Listo para grabar</p>
                    <audio id="audio-preview" style="display: none;"></audio>
                    
                    <div class="modal-actions" style="margin-top: auto;">
                        <button id="btn-save-rec" class="btn btn-save" disabled>Guardar Grabación</button>
                        <button id="btn-delete-rec" class="btn btn-delete" style="display: none;">Borrar Grabación</button>
                    </div>
                </div>

                <!-- COL 2: IMAGEN -->
                <div class="editor-col">
                    <div class="col-header" style="border-bottom: 3px solid #f59e0b;">🖼️ 2. Imagen / Foto</div>
                    <p style="text-align: left; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-secondary);">Sube una foto para reemplazar el dibujo:</p>
                    <input type="file" id="override-picto-file" accept="image/*" style="margin-bottom: 1rem; width: 100%;">
                    
                    <div class="modal-actions" style="margin-top: auto;">
                        <button id="btn-save-override-img" class="btn btn-save" style="background-color: #f59e0b; display: none;">Guardar Nueva Foto</button>
                        <button id="btn-delete-override-img" class="btn btn-delete" style="display: none;">Restaurar Dibujo Original</button>
                        <button id="btn-delete-picto" class="btn btn-delete" style="display: none; background-color: #991b1b; color: white;">🗑️ Borrar Foto Definitivamente</button>
                    </div>
                </div>
            </div>

            <div class="modal-actions" style="margin-top: 1.5rem;">
                <button id="btn-cancel-rec" class="btn btn-cancel">Cerrar Panel</button>
            </div>
        </div>
    </div>

    <!-- Add Custom Picto Modal -->
    <div id="add-picto-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>Añadir foto personalizada</h2>
            <div class="form-group">
                <label for="custom-picto-name">Nombre / Palabra:</label>
                <input type="text" id="custom-picto-name" placeholder="Ej: Mamá, Toby..." maxlength="20">
            </div>
            <div class="form-group">
                <label for="custom-picto-file">Seleccionar foto:</label>
                <input type="file" id="custom-picto-file" accept="image/*">
            </div>
            <img id="custom-picto-preview" style="max-width: 150px; max-height: 150px; margin: 1rem auto; display: none; border-radius: 8px; object-fit: cover;">
            <div class="modal-actions">
                <button id="btn-save-custom-picto" class="btn btn-save" disabled>Guardar Foto</button>
                <button id="btn-cancel-custom-picto" class="btn btn-cancel">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
